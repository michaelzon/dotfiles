set -g history-limit 10000
set -g base-index 1
set -g mouse on 
set -s escape-time 0 

# status line adjustments 
set-option -g status-left-length 100
set-option -g status-right-length 100

# Active window: use default colors (no overrides)
# set -g window-status-current-style "fg=default,bg=default"

# Inactive windows: dim the text
# set -g window-status-style "fg=default,dim"

set-option -g renumber-windows on
set-option -g status-position top

unbind Space
bind Space next-layout

# could not get option key to work yet
#set -g prefix M-w
#unbind C-b
#bind M-w send-prefix

bind-key -r F new-window t

bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind -r C popup -d "#{pane_current_path}"

#aliases
set -s command-alias[100] 'reload=source-file ~/.tmux.conf'

# Use vi keys in copy mode
setw -g mode-keys vi

# Enter copy mode
bind [ copy-mode

# In copy mode: / searches forward, ? searches backward (vi-style, already default with mode-keys vi)
# Quick search keybind straight into copy mode + search prompt
bind / copy-mode \; send-key /

# Better copy-mode selection (vi-style visual select / yank)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# bind-key c command-prompt -p "window name:" "new-window; rename-window '%%'"

bind-key T swap-window -t 1
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Themes
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark' # or 'dark', 'dark256', 'light', 'light256'

#set -g @plugin "janoamaral/tokyo-night-tmux"
#set -g @tokyo-night-tmux_theme night   # night (default) | storm | moon | day


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


