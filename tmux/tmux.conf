set -g history-limit 10000
set -g base-index 1
set -g mouse on 
set -s escape-time 0 

# status line adjustments 
set-option -g status-left-length 100
set-option -g status-right-length 100

# Active window: use default colors (no overrides)
set -g window-status-current-style "fg=default,bg=default"

# Inactive windows: dim the text
set -g window-status-style "fg=default,dim"

set-option -g renumber-windows on

unbind Space
bind Space next-layout

# could not get option key to work yet
#set -g prefix M-w
#unbind C-b
#bind M-w send-prefix

bind-key -r F new-window t

bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# bind-key c command-prompt -p "window name:" "new-window; rename-window '%%'"

bind-key T swap-window -t 1
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# minimal status bar theme
#set -g @plugin 'vaaleyard/tmux-dotbar'

